<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background: linear-gradient(145deg,#eef2f6,#d9e2ef);

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

.profile-card{

border-radius:40px;

text-align:center;

box-shadow:0 25px 60px rgba(0,0,0,0.15);

.profile-card:hover{

transform:translateY(-5px);

.profile-img{

width:160px;

height:160px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

margin-bottom:20px;

h1{

color:#0f172a;

margin-bottom:8px;

}

.headline{

background:#eef6ff;

color:#2563eb;

display:inline-block;

padding:6px 18px;

border-radius:30px;

font-size:14px;

margin-bottom:10px;

}

.location{

margin-top:10px;

color:#475569;

font-size:14px;

}

.divider{

width:80px;

height:4px;

background:#2563eb;

margin:25px auto;

border-radius:4px;

}

.info{

display:flex;

flex-direction:column;

gap:12px;

margin-bottom:30px;

}

.info-item{

background:#f8fafd;

padding:10px 18px;

border-radius:30px;

border:1px solid #e2e8f0;

font-size:15px;

display:flex;

align-items:center;

justify-content:center;

gap:8px;

color:#334155;

}

.info-item i{

color:#2563eb;

}

.contact-row{

display:flex;

justify-content:center;

gap:18px;

margin-top:25px;

}

.icon-btn{

width:60px;

height:60px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

color:white;

text-decoration:none;

transition:0.3s;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

.icon-btn:hover{

transform:translateY(-5px) scale(1.07);

}

.phone{

background:#2c3e50;

}

.whatsapp{

background:#25D366;

}

.facebook{

background:#1877F2;

}

.email{

background:#ea4335;

}

.connect-note{

margin-top:30px;

font-size:13px;

color:#64748b;

display:flex;

align-items:center;

justify-content:center;

gap:6px;

border-top:1px dashed #cbd5e1;

padding-top:15px;

}

.connect-note i{

color:#2563eb;

}

@media(max-width:400px){

.contact-row{

gap:14px;

}

.icon-btn{

width:55px;

height:55px;

font-size:22px;

}

}

</style>
