<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Farhan Hasin Fahim · Professional Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Inter", sans-serif;
    background: linear-gradient(145deg, #eef2f6, #d9e2ef);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.profile-card {
    background: white;
    max-width: 440px;
    width: 100%;
    padding: 40px 30px;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
}

/* প্রোফাইল ফটো - সাদা বর্ডার ছাড়া শুধু স্কাই ব্লু বর্ডার */
.profile-img {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    object-fit: cover;
    /* এখানে padding: 0 দেওয়া হয়েছে যাতে কোনো সাদা অংশ না থাকে */
    padding: 0; 
    border: 6px solid #3498db; 
    box-shadow: 0 10px 25px rgba(52, 152, 219, 0.25);
    margin-bottom: 20px;
    display: inline-block;
}

h1 {
    font-size: 32px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 8px;
}

.headline {
    background: #eef6ff;
    color: #2563eb;
    display: inline-block;
    padding: 6px 18px;
    border-radius: 30px;
    font-size: 14px;
    margin-bottom: 12px;
}

.location {
    color: #64748b;
    font-size: 14px;
    margin-bottom: 20px;
}

.divider {
    width: 60px;
    height: 4px;
    background: #2563eb;
    margin: 0 auto 25px;
    border-radius: 10px;
}

.info {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
}

.info-item {
    background: #f8fafd;
    padding: 12px 20px;
    border-radius: 30px;
    border: 1px solid #e2e8f0;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #334155;
}

.info-item i {
    color: #2563eb;
}

.contact-row {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
}

.icon-btn {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.icon-btn:hover {
    transform: translateY(-3px);
    filter: brightness(1.1);
}

.phone { background: #334155; }
.whatsapp { background: #25D366; }
.facebook { background: #1877F2; }
.email { background: #ea4335; }

/* মোবাইল ফুটার ফিক্স */
.connect-note {
    border-top: 1px dashed #cbd5e1;
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #94a3b8;
    font-size: 12px;
    width: 100%;
}

.connect-note i {
    color: #2563eb;
    flex-shrink: 0;
}

.connect-note span {
    white-space: nowrap; /* লেখা এক লাইনে রাখতে সাহায্য করবে */
}

@media (max-width: 480px) {
    .profile-card {
        padding: 30px 15px;
    }

    .profile-img {
        width: 145px;
        height: 145px;
        border-width: 5px;
    }

    h1 {
        font-size: 26px;
    }

    .connect-note {
        font-size: 10px;
        gap: 5px;
    }
}
</style>
</head>

<body>

<div class="profile-card">

    <img src="1.png" class="profile-img" alt="Farhan Hasin Fahim">

    <h1>Farhan Hasin Fahim</h1>

    <div class="headline">
        <i class="fa-regular fa-circle-check"></i>
        ETE · RUET
    </div>

    <div class="location">
        <i class="fa-solid fa-location-dot"></i>
        Chilahati, Domar, Nilphamari
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="info-item">
            <i class="fa-solid fa-microchip"></i>
            <span>Student of <b>ETE, RUET</b></span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-building-columns"></i>
            <span><b>Rangpur Govt College</b></span>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-school"></i>
            <span><b>Chilahati Merchants High School</b></span>
        </div>
    </div>

    <div class="contact-row">
        <a href="tel:+8801712345678" class="icon-btn phone">
            <i class="fa-solid fa-phone"></i>
        </a>
        <a href="https://wa.me/8801767207999" class="icon-btn whatsapp" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="https://www.facebook.com/fhf2022/" class="icon-btn facebook" target="_blank">
            <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="mailto:mdfhf2020@gmail.com" class="icon-btn email">
            <i class="fa-solid fa-envelope"></i>
        </a>
    </div>

    <div class="connect-note">
        <i class="fa-solid fa-box-archive"></i>
        <span>Collecting the past, connecting the future.</span>
        <i class="fa-solid fa-book-open"></i>
    </div>

</div>

</body>
</html>
