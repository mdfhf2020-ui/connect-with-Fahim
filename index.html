<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhan Hasin Fahim · Professional Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(145deg, #eef2f6, #d9e2ef);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-card {
            background: white;
            max-width: 440px;
            width: 100%;
            padding: 35px 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .headline {
            background: #eef6ff;
            color: #2563eb;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .location {
            margin-top: 10px;
            color: #475569;
            font-size: 14px;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: #2563eb;
            margin: 25px auto;
            border-radius: 4px;
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .info-item {
            background: #f8fafd;
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #334155;
        }

        .info-item i {
            color: #2563eb;
        }

        .contact-row {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 25px;
            flex-wrap: wrap; /* ছোট স্ক্রিনে আইকনগুলোকে নিচে নামার জায়গা দেয় */
        }

        .icon-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .icon-btn:hover {
            transform: translateY(-5px) scale(1.07);
        }

        .phone { background: #2c3e50; }
        .whatsapp { background: #25D366; }
        .facebook { background: #1877F2; }
        .email { background: #ea4335; }

        /* ফুটার সেকশন সংশোধন */
        .connect-note {
            margin-top: 30px;
            font-size: 13px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 15px;
            flex-wrap: nowrap; /* লেখা ও আইকন যেন এক লাইনে থাকে */
        }

        .connect-note i {
            color: #2563eb;
            flex-shrink: 0; /* আইকনগুলোকে ছোট হতে বাধা দেয় */
        }

        /* মোবাইল অপ্টিমাইজেশন */
        @media (max-width: 480px) {
            .profile-card {
                padding: 25px 20px;
                border-radius: 30px;
            }
            
            h1 {
                font-size: 26px;
            }

            .icon-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .contact-row {
                gap: 12px;
            }

            .connect-note {
                font-size: 11px; /* ছোট স্ক্রিনে ফন্ট সাইজ কমানো হয়েছে */
                gap: 6px;
            }
            
            .info-item {
                font-size: 13px;
                padding: 8px 14px;
            }
        }
    </style>
</head>
<body>

<div class="profile-card">
    <img src="1.png" class="profile-img" alt="Farhan Hasin Fahim">

    <h1>Farhan Hasin Fahim</h1>

    <div class="headline">
        <i class="fa-regular fa-circle-check"></i>
        ETE · RUET
    </div>

    <div class="location">
        <i class="fa-solid fa-location-dot"></i>
        Chilahati, Domar, Nilphamari
    </div>

    <div class="divider"></div>

    <div class="info">
        <div class="info-item">
            <i class="fa-solid fa-microchip"></i>
            Student of <b>ETE, RUET</b>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-building-columns"></i>
            <b>Rangpur Govt College</b>
        </div>
        <div class="info-item">
            <i class="fa-solid fa-school"></i>
            <b>Chilahati Merchants High School</b>
        </div>
    </div>

    <div class="contact-row">
        <a href="tel:+8801767207999" class="icon-btn phone" title="Call Me">
            <i class="fa-solid fa-phone"></i>
        </a>
        <a href="https://wa.me/8801767207999" class="icon-btn whatsapp" target="_blank" title="WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="https://www.facebook.com/fhf2022/" class="icon-btn facebook" target="_blank" title="Facebook">
            <i class="fa-brands fa-facebook-f"></i>
        </a>
        <a href="mailto:mdfhf2020@gmail.com" class="icon-btn email" title="Email Me">
            <i class="fa-solid fa-envelope"></i>
        </a>
    </div>

    <div class="connect-note">
        <i class="fa-solid fa-box-archive"></i>
        <span>Collecting the past, connecting the future.</span>
        <i class="fa-solid fa-book-open"></i>
    </div>
</div>

</body>
</html>
